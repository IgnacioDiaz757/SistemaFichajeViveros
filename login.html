<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Acceso Admin — Asistencia Obra</title>
  <link rel="stylesheet" href="styles-login.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="card">

    <div class="card-top">
      <img src="public/images/ISOLOGOTIPOViverosUnidos.png" alt="Logo cooperativa" class="logo">
      <h1>Acceso Administrativo</h1>
      <p class="subtitulo">Panel de administración de asistencia</p>
    </div>

    <form id="form-login" onsubmit="login(event)">
      <div class="campo">
        <label for="usuario">Email</label>
        <input type="email" id="usuario" placeholder="tu@email.com" autocomplete="email" required>
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password" required>
          <button type="button" class="toggle-pass" onclick="togglePass()" tabindex="-1"><i data-lucide="eye"></i></button>
        </div>
      </div>
      <button type="submit" id="btn-ingresar">Ingresar</button>
    </form>

    <p id="error"></p>
    <a href="index.html" class="volver">← Volver al inicio</a>

  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js"></script>
  <script>
    function togglePass() {
      const inp = document.getElementById("password");
      inp.type = inp.type === "password" ? "text" : "password";
    }
    document.addEventListener("DOMContentLoaded", () => lucide.createIcons());
  </script>

</body>
</html>
